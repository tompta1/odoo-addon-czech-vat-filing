[options]
# Addons mounted by podman-compose.yaml / docker compose
addons_path = /mnt/odoomates-addons,/mnt/custom-addons
data_dir = /var/lib/odoo

# Database manager master password (required).
# Replace with a strong random value in real deployments.
admin_passwd = change-me-strong-random

# DB connection to the compose postgres service.
db_host = db
db_user = odoo
db_password = odoo

# First-run friendly defaults.
# For hardened production, you can later set:
#   list_db = False
#   dbfilter = ^your_db_name$
proxy_mode = True
list_db = True
log_level = info
